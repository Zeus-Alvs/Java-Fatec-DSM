<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <title>Lista Produtos</title>
</head>
<body>
    <div class="container mt-5">
        <h1 class="display-5 mb-4">Lista de Produtos</h1>
        <div class="alert alert-info" role="alert"
                th:if="${#lists.isEmpty(produtos)}">
            Nenhum Produto Cadastrado Ainda
        </div>
        <table class="table table-striped"
               th:unless="${#lists.isEmpty(produtos)}">
            <thead>
            <tr>
                <th>#</th>
                <th>Nome</th>
                <th>Preço</th>
                <td>Categoria</td>
                <th>Estoque</th>
                <th>Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="produto, iterStat:${produtos}">
                <td th:text="${iterStat.count}">1</td>
                <td th:text="${produto.nome}">Nome</td>
                <td th:text="${produto.preco}">0,00</td>
                <td th:text="${produto.categoria}">Categoria</td>
                <td th:text="${produto.estoque}">Estoque</td>
                <td>
                    <a class="btn btn-danger" th:href="@{/remover/{id}(id=${iterStat.index})}">Remover</a>
                </td>
            </tr>
            </tbody>
        </table>
        <p>Total de Produtos: <span th:text="${#lists.size(produtos)}">0</span>    </p>
        <a class="btn btn-primary" href="/cadastrar">
            + Cadastrar Novo Produto
        </a>
    </div>
</body>
</html>
