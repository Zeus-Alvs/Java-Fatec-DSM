<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${clima != null ? clima.timezone : 'Erro'} + ' - Detalhes'">Clima - Detalhes</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background-color: #f5f5f5; }
        .card { background: white; border-radius: 8px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; gap: 30px; align-items: flex-start; }
        .bandeira img { width: 250px; border: 1px solid #ddd; border-radius: 4px; }
        .info h1 { margin-top: 0; color: #333; font-size: 28px; }
        .info p { margin: 10px 0; color: #555; line-height: 1.5; font-size: 16px; }
        .info strong { color: #333; }
        .badge { display: inline-block; background: #007bff; color: white; padding: 3px 12px; border-radius: 12px; font-size: 14px; margin-bottom: 10px; }
        .voltar { display: inline-block; margin-bottom: 20px; color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
<a href="/" class="voltar">&larr; Nova busca</a>

<div class="card" th:if="${clima != null}">

    <div class="info">

        <h1 th:text="${clima.timezone}">Nome do País</h1>


        <p><strong>Temperatura:</strong>
            <span th:text="${clima.current.temperature}"></span>
        </p>

        <p><strong>Clima:</strong> <span th:text="${clima.current.descricao}"></span></p>

        <p><strong>Vento:</strong>
            <span th:text="${clima.current.windspeed}"></span>
        </p>

    </div>
</div>

<div th:if="${clima == null}" style="color: red; padding: 20px; background: #fee; border-radius: 8px;">
    <h2>Coordenadas Invalidas!</h2>
</div>
</body>
</html>
