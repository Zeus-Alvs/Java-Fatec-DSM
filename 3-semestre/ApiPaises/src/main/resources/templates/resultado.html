<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pais != null ? pais.name.common : 'Erro'} + ' - Detalhes'">País - Detalhes</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background-color: #f5f5f5; }
        .card { background: white; border-radius: 8px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; gap: 30px; align-items: flex-start; }
        .bandeira img { width: 250px; border: 1px solid #ddd; border-radius: 4px; }
        .info h1 { margin-top: 0; color: #333; font-size: 28px; }
        .info p { margin: 10px 0; color: #555; line-height: 1.5; font-size: 16px; }
        .info strong { color: #333; }
        .badge { display: inline-block; background: #007bff; color: white; padding: 3px 12px; border-radius: 12px; font-size: 14px; margin-bottom: 10px; }
        .voltar { display: inline-block; margin-bottom: 20px; color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
<a href="/" class="voltar">&larr; Nova busca</a>

<div class="card" th:if="${pais != null}">
    <div class="bandeira">
        <img th:src="${pais.flags.png}" th:alt="'Bandeira de ' + ${pais.name.common}" />
    </div>

    <div class="info">
        <span class="badge" th:text="${pais.region}">Região</span>

        <h1 th:text="${pais.name.common}">Nome do País</h1>

        <p><strong>Nome Oficial:</strong> <span th:text="${pais.name.official}"></span></p>

        <p><strong>Capital:</strong>
            <span th:text="${pais.capital != null ? pais.capital[0] : 'N/A'}"></span>
        </p>

        <p><strong>Sub-região:</strong> <span th:text="${pais.subregion}"></span></p>

        <p><strong>População:</strong>
            <span th:text="${#numbers.formatDecimal(pais.population, 0, 'POINT', 0, 'COMMA')}"></span> habitantes
        </p>

        <p><strong>Área:</strong>
            <span th:text="${#numbers.formatDecimal(pais.area, 0, 'POINT', 0, 'COMMA')}"></span> km²
        </p>
    </div>
</div>

<div th:if="${pais == null}" style="color: red; padding: 20px; background: #fee; border-radius: 8px;">
    <h2>País não encontrado!</h2>
    <p>Verifique se o nome foi digitado corretamente em inglês.</p>
</div>
</body>
</html>
