<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca País</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 80px auto;
            text-align: center;
            background-color: #f5f5f5;
        }
        h1 { color: #333; }
        form {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 30px;
        }
        input[type="text"] {
            padding: 10px 16px;
            font-size: 16px;
            width: 300px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #e8a000;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background-color: #c78a00; }
    </style>
</head>
<body>
    <h1>Busca de paises</h1>
    <p>Digite o nome de um país para procurar suas informações na API..</p>
    <form action="/buscar" method="get">
        <input type="text" name="pais" placeholder="Digite o nome do país..." required />
        <button type="submit">Buscar</button>
    </form>
</body>
</html>
